name: Imperial Synthesis Engine (v2026)

on:
  repository_dispatch:
    types: [synthesis_triggered]
  workflow_dispatch:
    inputs:
      resource_id:
        description: 'The ID of the resource to synthesize'
        required: true

jobs:
  synthesize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Imperial Code
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Intelligence Drivers
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ignite Synthesis Forge
        env:
          GOOGLE_STUDIO_API_KEY: ${{ secrets.GOOGLE_STUDIO_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          USE_S3: ${{ secrets.USE_S3 }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_STORAGE_BUCKET_NAME: ${{ secrets.AWS_STORAGE_BUCKET_NAME }}
          AWS_S3_ENDPOINT_URL: ${{ secrets.AWS_S3_ENDPOINT_URL }}
        run: |
          cd backend
          # We call the management command I built earlier
          python manage.py run_synthesis ${{ github.event.inputs.resource_id || github.event.client_payload.resource_id }}
