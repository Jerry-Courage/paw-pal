name: Keep Render Services Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping Backend
        run: |
          echo "Pinging backend at $(date -u)..."
          curl -s -o /dev/null -w "Backend HTTP: %{http_code}\n" \
            --max-time 45 \
            "https://flowstate-backend-pukh.onrender.com/health/" || echo "Backend ping failed"

      - name: Ping Frontend
        run: |
          echo "Pinging frontend at $(date -u)..."
          curl -s -o /dev/null -w "Frontend HTTP: %{http_code}\n" \
            --max-time 45 \
            "https://flowstate-frontend-7irq.onrender.com/" || echo "Frontend ping failed"
