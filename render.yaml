services:
  # ─── BACKEND WEB SERVICE ────────────────────────────────────────────────────
  - type: web
    name: flowstate-backend
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT core.asgi:application"
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flowstate-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: flowstate-redis
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ─── FRONTEND WEB SERVICE ───────────────────────────────────────────────────
  - type: web
    name: flowstate-frontend
    env: node
    plan: free
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    rootDir: frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: flowstate-backend
          property: host
          suffix: /api
      - key: NEXTAUTH_URL
        fromService:
          type: web
          name: flowstate-frontend
          property: host

  # ─── REDIS (FOR CHANNELS / TASKS) ───────────────────────────────────────────
  - type: redis
    name: flowstate-redis
    plan: free
    ipAllowList: [] # Only allow internal connections

databases:
  - name: flowstate-db
    plan: free
