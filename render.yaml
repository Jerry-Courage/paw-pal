services:
  # ─── BACKEND WEB SERVICE ────────────────────────────────────────────────────
  - type: web
    name: paw-pal-backend
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT core.asgi:application"
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: paw-pal-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: paw-pal-redis
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.1"
      - key: ALLOWED_HOSTS
        value: "*"

  # ─── FRONTEND WEB SERVICE ───────────────────────────────────────────────────
  - type: web
    name: paw-pal-frontend
    env: node
    plan: free
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    rootDir: frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: paw-pal-backend
          property: host
          suffix: /api
      - key: NEXTAUTH_URL
        fromService:
          type: web
          name: paw-pal-frontend
          property: host
      - key: NEXTAUTH_SECRET
        generateValue: true

  # ─── REDIS (FOR CHANNELS / TASKS) ───────────────────────────────────────────
  - type: redis
    name: paw-pal-redis
    plan: free
    ipAllowList: [] # Only allow internal connections

databases:
  - name: paw-pal-db
    plan: free
