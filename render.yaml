services:
  # ─── BACKEND WEB SERVICE ────────────────────────────────────────────────────
  - type: web
    name: paw-pal-backend
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "python manage.py migrate --noinput && python manage.py shell -c \"
import os, django
from django.contrib.auth import get_user_model
User = get_user_model()
email = os.getenv('ADMIN_EMAIL','')
username = os.getenv('ADMIN_USERNAME','admin')
password = os.getenv('ADMIN_PASSWORD','')
if email and password and not User.objects.filter(email=email).exists():
    User.objects.create_superuser(email=email, username=username, password=password)
    print('Superuser created:', email)
\" && daphne -b 0.0.0.0 -p $PORT core.asgi:application"
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: paw-pal-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: paw-pal-redis
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.1"
      - key: ALLOWED_HOSTS
        value: "*"

  # ─── AI WORKER SERVICE (FREE TIER HACK) ─────────────────────────────────────
  - type: web
    name: paw-pal-worker
    env: python
    plan: free
    buildCommand: "./build.sh"
    # Starts the worker in background and runs a dummy web server to pass health checks
    startCommand: "python manage.py qcluster & python -m http.server $PORT"
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: paw-pal-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: paw-pal-redis
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.1"
      - key: ALLOWED_HOSTS
        value: "*"

  # ─── FRONTEND WEB SERVICE ───────────────────────────────────────────────────
  - type: web
    name: paw-pal-frontend
    env: node
    plan: free
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    rootDir: frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: paw-pal-backend
          property: hostWithScheme
          suffix: /api
      - key: API_URL
        fromService:
          type: web
          name: paw-pal-backend
          property: hostWithScheme
          suffix: /api
      - key: NEXTAUTH_URL
        fromService:
          type: web
          name: paw-pal-frontend
          property: hostWithScheme
      - key: NEXTAUTH_SECRET
        generateValue: true

  # ─── REDIS (FOR CHANNELS / TASKS) ───────────────────────────────────────────
  - type: redis
    name: paw-pal-redis
    plan: free
    ipAllowList: [] 

databases:
  - name: paw-pal-db
    plan: free
